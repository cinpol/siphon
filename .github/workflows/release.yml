name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The real binary links librados/librbd via cgo, so both architectures
      # need the Ceph client dev libraries. amd64 builds natively; arm64 is
      # cross-compiled, which needs the arm64 cross-compiler plus the arm64
      # librados/librbd installed side-by-side via Debian/Ubuntu "multiarch".
      # arm64 library packages live on ports.ubuntu.com, so we scope the default
      # sources to amd64 and add the ports mirror for arm64.
      - name: Install Ceph client libraries (amd64 + arm64 cross)
        run: |
          set -eux
          sudo dpkg --add-architecture arm64
          codename="$(. /etc/os-release && echo "$VERSION_CODENAME")"

          # Replace the runner's apt sources with a deterministic pair from
          # Canonical's canonical mirrors: archive.ubuntu.com for amd64 and
          # ports.ubuntu.com for arm64. This matters because librados2 is
          # "Multi-Arch: same" — the amd64 and arm64 copies must be the *exact*
          # same version to co-install — and only these two canonical mirrors
          # are published in lockstep. The runner's default mirror can lag ports
          # and break that. Each source is scoped to a single architecture so
          # neither is queried for the other. Third-party repos are dropped: we
          # only need Ubuntu's own repos (cross-compiler + Ceph client libs).
          sudo rm -f /etc/apt/sources.list
          sudo mkdir -p /tmp/apt-disabled
          sudo find /etc/apt/sources.list.d -maxdepth 1 -type f -exec mv {} /tmp/apt-disabled/ \;
          sudo tee /etc/apt/sources.list.d/ubuntu.sources >/dev/null <<EOF
          Types: deb
          URIs: http://archive.ubuntu.com/ubuntu
          Suites: ${codename} ${codename}-updates ${codename}-backports
          Components: main universe restricted multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://security.ubuntu.com/ubuntu
          Suites: ${codename}-security
          Components: main universe restricted multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: ${codename} ${codename}-updates ${codename}-backports ${codename}-security
          Components: main universe restricted multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF

          sudo apt-get update
          # amd64 build: dev packages give the headers (arch-independent, so they
          # serve both builds) and the amd64 libraries. The cross-compiler builds
          # arm64 object code.
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            librados-dev librbd-dev

          # arm64 build: the Ubuntu Ceph packages are Multi-Arch: no, so the
          # arm64 libraries can't be co-installed alongside the amd64 ones via
          # apt. Instead fetch the arm64 runtime .debs and unpack them into place
          # WITHOUT registering them with dpkg (no conflict) — enough to link
          # against. Then add the linker symlinks a -dev package would provide,
          # so cgo's `-lrados`/`-lrbd` resolve when cross-compiling.
          tmp="$(mktemp -d)"
          ( cd "$tmp" && apt-get download librados2:arm64 librbd1:arm64 )
          for deb in "$tmp"/*.deb; do sudo dpkg-deb -x "$deb" /; done
          rm -rf "$tmp"
          sudo ln -sf librados.so.2 /usr/lib/aarch64-linux-gnu/librados.so
          sudo ln -sf librbd.so.1 /usr/lib/aarch64-linux-gnu/librbd.so

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build the container image for each architecture on a native runner and push
  # it by digest (no tag yet); the docker-merge job then stitches the per-arch
  # digests into one multi-arch tag. Native runners avoid emulating arm64 under
  # qemu, and the image compiles Siphon inside its own build, so no cross setup
  # is needed here.
  docker:
    name: Docker image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm # free native arm64 runner (public repos)
    steps:
      - uses: actions/checkout@v4

      - name: Image version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            CEPH_RELEASE=tentacle
            VERSION=${{ steps.ver.outputs.version }}
          outputs: type=image,name=docker.io/cinpol/siphon,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Docker manifest (Docker Hub)
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Image version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Stitch the per-arch digests into one multi-arch manifest. Image tags
      # drop the leading "v" (Docker convention): v0.4.0 -> 0.4.0.
      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t docker.io/cinpol/siphon:${{ steps.ver.outputs.version }} \
            -t docker.io/cinpol/siphon:latest \
            $(printf 'docker.io/cinpol/siphon@sha256:%s ' *)

      - name: Inspect manifest
        run: docker buildx imagetools inspect docker.io/cinpol/siphon:${{ steps.ver.outputs.version }}
