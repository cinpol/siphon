name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The release binary links librados/librbd via cgo, so the Ceph client
      # development headers must be present on the (amd64) runner.
      - name: Install Ceph client libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y librados-dev librbd-dev

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker image (Docker Hub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            CEPH_RELEASE=tentacle
            VERSION=${{ github.ref_name }}
          tags: |
            cinpol/siphon:${{ github.ref_name }}
            cinpol/siphon:latest
