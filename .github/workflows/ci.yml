name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint & test (mock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  build-native:
    name: Build native (goceph)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The real (cluster-capable) build links librados/librbd via cgo, so the
      # Ceph client development headers must be present. This job doesn't need a
      # cluster — it only compile-checks that the native transport still builds.
      - name: Install cross-compiler and Ceph client libraries
        run: |
          sudo dpkg --add-architecture arm64
          # Configure APT to fetch arm64 packages from ports.ubuntu.com
          sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64 i386/' /etc/apt/sources.list.d/ubuntu.sources || true
          sudo sed -i 's/^deb /deb [arch=amd64,i386] /' /etc/apt/sources.list || true
          cat <<EOF | sudo tee /etc/apt/sources.list.d/ubuntu-ports.sources
          Types: deb
          Architectures: arm64
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-backports noble-security
          Components: main universe restricted multiverse
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu librados-dev librbd-dev librados-dev:arm64 librbd-dev:arm64

      - name: Build native (goceph tag - amd64)
        run: go build -tags goceph ./...

      - name: Build cross-compile (goceph tag - arm64)
        env:
          CC: aarch64-linux-gnu-gcc
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          GOARCH: arm64
          CGO_ENABLED: 1
        run: go build -tags goceph ./...
