# GoReleaser configuration for Siphon.
#
# The real (cluster-capable) binary links librados/librbd via cgo. GoReleaser
# runs once on an amd64 host and builds both architectures in that single run:
#   - amd64 natively, with the default gcc;
#   - arm64 cross-compiled, using aarch64-linux-gnu-gcc and the arm64 librados
#     installed via multiarch (the release workflow sets that toolchain up).
# Keeping it to one run makes GoReleaser the single source of truth for the
# release: one archive per arch, one checksums file, one changelog.
# See .github/workflows/release.yml for the toolchain setup.
#
# Validate this config without publishing:
#   goreleaser check
version: 2

project_name: siphon

builds:
  - id: siphon
    main: ./cmd/siphon
    binary: siphon
    tags:
      - goceph
    env:
      - CGO_ENABLED=1
      # amd64 links against the runner's native librados with the system gcc.
      # arm64 is cross-compiled with the arm64 cross-compiler (the release
      # workflow provides the arm64 librados to link against).
      - '{{ if eq .Arch "arm64" }}CC=aarch64-linux-gnu-gcc{{ else }}CC=gcc{{ end }}'
      # The arm64 librados is unpacked without its transitive dependency chain
      # (libceph-common, boost, ...), which isn't needed at link time — the
      # target system provides it at runtime. Tell the linker to leave symbols
      # referenced from within shared libraries unresolved (amd64 needs nothing).
      - '{{ if eq .Arch "arm64" }}CGO_LDFLAGS=-Wl,--unresolved-symbols=ignore-in-shared-libs{{ else }}CGO_LDFLAGS={{ end }}'
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/cinpol/siphon/internal/version.Version={{ .Version }}
      - -X github.com/cinpol/siphon/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/cinpol/siphon/internal/version.Date={{ .Date }}

archives:
  - id: siphon
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - NOTICE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs(\(.+\))?:'
      - '^test(\(.+\))?:'
      - '^chore(\(.+\))?:'
      - '^ci(\(.+\))?:'
      - '^Merge '
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?:'
      order: 0
    - title: Fixes
      regexp: '^fix(\(.+\))?:'
      order: 1
    - title: Other changes
      order: 999

release:
  github:
    owner: cinpol
    name: siphon
  # Create the release as a draft so you can review the artifacts and notes
  # before publishing. Pre-release tags (e.g. v0.1.0-rc1) are marked automatically.
  draft: true
  prerelease: auto
